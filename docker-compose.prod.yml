# ─── RentaWay Maroc — Stack production ──────────────────────
# Usage : docker compose -f docker-compose.prod.yml up -d --build
# Toutes les variables sensibles viennent du fichier .env.production

services:

  postgres:
    image: postgres:16-alpine
    container_name: rentaway_db
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-rentaway}
      POSTGRES_USER:     ${POSTGRES_USER:-rentaway_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rentaway_user} -d ${POSTGRES_DB:-rentaway}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rentaway_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rentaway_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-rentaway_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rentaway}
    env_file:
      - .env.production
    volumes:
      - ./backend/exports:/app/exports
      - uploaded_photos:/app/uploads
    networks:
      - rentaway_net
    # On expose seulement vers le réseau interne (nginx fait le proxy)
    expose:
      - "4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_KEY}
        NEXT_PUBLIC_STRIPE_KEY: ${NEXT_PUBLIC_STRIPE_KEY}
    container_name: rentaway_web
    restart: always
    depends_on:
      - backend
    environment:
      NODE_ENV: production
    env_file:
      - .env.production
    volumes:
      - uploaded_photos:/app/public/uploads:ro
    networks:
      - rentaway_net
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: rentaway_nginx
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./nginx-logs:/var/log/nginx
    networks:
      - rentaway_net

volumes:
  postgres_data:
  uploaded_photos:

networks:
  rentaway_net:
    driver: bridge
