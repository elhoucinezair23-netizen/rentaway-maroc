# ─── RentaWay Maroc — Nginx reverse-proxy ───────────────────
# rentaway.ma          → frontend Next.js (port 3000)
# www.rentaway.ma      → redirige vers rentaway.ma
# api.rentaway.ma      → backend Express (port 4000)
# Tout le HTTP redirige vers HTTPS.

worker_processes auto;
events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout 65;
  server_tokens off;

  # Logs
  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
  access_log  /var/log/nginx/access.log  main;
  error_log   /var/log/nginx/error.log   warn;

  # Compression
  gzip               on;
  gzip_vary          on;
  gzip_proxied       any;
  gzip_comp_level    6;
  gzip_types text/plain text/css text/javascript application/javascript
             application/json application/xml application/rss+xml
             image/svg+xml font/woff2;

  # Limites
  client_max_body_size 25M;

  # Rate limit anti DDoS — 10 req/s par IP, burst 30
  limit_req_zone $binary_remote_addr zone=api_rate:10m rate=10r/s;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  # Reverse proxy : préserver l'IP réelle
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_http_version 1.1;

  # ─── Redirection HTTP → HTTPS ─────────────────────────────
  server {
    listen 80;
    listen [::]:80;
    server_name rentaway.ma www.rentaway.ma api.rentaway.ma;

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── Redirection www → apex ───────────────────────────────
  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.rentaway.ma;

    ssl_certificate     /etc/nginx/ssl/rentaway.ma.crt;
    ssl_certificate_key /etc/nginx/ssl/rentaway.ma.key;

    return 301 https://rentaway.ma$request_uri;
  }

  # ─── Frontend — rentaway.ma ───────────────────────────────
  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name rentaway.ma;

    ssl_certificate     /etc/nginx/ssl/rentaway.ma.crt;
    ssl_certificate_key /etc/nginx/ssl/rentaway.ma.key;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Headers de sécurité
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection          "1; mode=block" always;

    limit_conn conn_limit 30;

    location / {
      proxy_pass http://frontend:3000;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 90s;
    }

    # Cache long pour les assets statiques Next.js
    location /_next/static/ {
      proxy_pass http://frontend:3000;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location /uploads/ {
      proxy_pass http://frontend:3000;
      expires 30d;
      add_header Cache-Control "public";
    }
  }

  # ─── Backend API — api.rentaway.ma ────────────────────────
  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.rentaway.ma;

    ssl_certificate     /etc/nginx/ssl/rentaway.ma.crt;
    ssl_certificate_key /etc/nginx/ssl/rentaway.ma.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;

    limit_req zone=api_rate burst=30 nodelay;
    limit_conn conn_limit 20;

    # Stripe webhooks — pas de rate limit
    location /api/payments/webhook {
      proxy_pass http://backend:4000;
      proxy_read_timeout 30s;
    }

    # Socket.IO
    location /socket.io/ {
      proxy_pass http://backend:4000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 86400s;
    }

    location / {
      proxy_pass http://backend:4000;
      proxy_read_timeout 60s;
    }
  }
}
