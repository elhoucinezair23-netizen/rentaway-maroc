<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60" role="img" aria-label="RentaWay Maroc">
  <defs>
    <linearGradient id="rw-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E63946"/>
      <stop offset="100%" stop-color="#B01F2B"/>
    </linearGradient>
  </defs>

  <!-- Icône : map pin enveloppant une clé -->
  <g transform="translate(4,4)">
    <!-- Pin -->
    <path d="M26 0 C11.6 0 0 11.6 0 26 C0 44 26 52 26 52 C26 52 52 44 52 26 C52 11.6 40.4 0 26 0 Z"
          fill="url(#rw-grad)"/>
    <!-- Cercle blanc intérieur -->
    <circle cx="26" cy="24" r="14" fill="#ffffff"/>
    <!-- Clé stylisée à l'intérieur -->
    <g transform="translate(15,17)" fill="#1D3557">
      <!-- Anneau de la clé -->
      <circle cx="6" cy="7" r="4.5" fill="none" stroke="#1D3557" stroke-width="2"/>
      <!-- Tige -->
      <rect x="9.5" y="6" width="13" height="2.2" rx="1"/>
      <!-- Dents -->
      <rect x="18" y="6" width="2" height="4.5" rx="0.5"/>
      <rect x="21" y="6" width="2" height="3.5" rx="0.5"/>
    </g>
  </g>

  <!-- Texte -->
  <g transform="translate(70,0)" font-family="Inter, Arial, sans-serif">
    <text x="0" y="32" font-size="24" font-weight="700" fill="#1D3557" letter-spacing="-0.5">
      Renta<tspan fill="#E63946">Way</tspan>
    </text>
    <text x="0" y="50" font-size="9" font-weight="600" fill="#F4A261" letter-spacing="4">
      MAROC
    </text>
  </g>
</svg>
